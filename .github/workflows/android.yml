steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    - name: Find and Build with Gradle
      run: |
        find . -name "gradlew" -exec chmod +x {} \;
        ./$(find . -name "gradlew" | head -n 1 | cut -c 3-) assembleDebug
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: **/build/outputs/apk/debug/*.apk
